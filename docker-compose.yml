services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finan}
      POSTGRES_DB: ${POSTGRES_DB:-finan_control}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finan} -d ${POSTGRES_DB:-finan_control}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-finan}:${POSTGRES_PASSWORD:-finan}@db:5432/${POSTGRES_DB:-finan_control}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env or shell}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      GOOGLE_OAUTH_CLIENT_IDS: ${GOOGLE_OAUTH_CLIENT_IDS:-}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
